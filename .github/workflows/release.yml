name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches module/release metadata
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION="$(python3 -c "import json;print(json.load(open('src/module.json'))['version'])")"
          RELEASE_VERSION="$(python3 -c "import json;print(json.load(open('release.json'))['version'])")"
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != src/module.json version ($MODULE_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) != release.json version ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Fetch Move Anything headers
        run: |
          git clone --depth 1 https://github.com/charlesvestal/move-anything.git .deps/move-anything

      - name: Build module tarball
        run: |
          chmod +x scripts/build.sh scripts/build-module.sh
          MOVE_ANYTHING_SRC="$GITHUB_WORKSPACE/.deps/move-anything/src" ./scripts/build-module.sh
          test -f dist/chord-flow-module.tar.gz

      - name: Verify GLIBC compatibility
        run: |
          syms="$(strings dist/chord-flow/dsp.so | grep -oE 'GLIBC_[0-9]+\.[0-9]+' || true)"
          if [ -z "$syms" ]; then
            echo "No GLIBC symbols found in dsp.so (unexpected)."
            exit 1
          fi
          max_glibc="$(echo "$syms" | sed 's/GLIBC_//' | sort -V | tail -n 1)"
          echo "Max GLIBC symbol: $max_glibc"
          if [ "$(printf '%s\n' "$max_glibc" "2.17" | sort -V | tail -n 1)" != "2.17" ]; then
            echo "Incompatible GLIBC symbol version detected: $max_glibc (expected <= 2.17)"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/chord-flow-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
